<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Command Center V9.0 - FINAL FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; transition: 0.3s; padding: 10px 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-right text-white/40 text-[10px] mb-2 font-mono">DEPLOYMENT_STAMP: V9_FINAL_STABLE</div>

        <div class="bg-white rounded-3xl p-8 mb-6 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium italic">Handshake Corrected | 2026 Engine</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="tab('social')" class="nav-btn active" id="b-social">📱 Social Media Generator</button>
            <button onclick="tab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="tab('warroom')" class="nav-btn">⚡ War-Room Prompts</button>
            <button onclick="tab('settings')" class="nav-btn bg-black border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-10 min-h-[500px]">
            <div id="social-tab" class="panel">
                <h2 class="text-2xl font-bold text-indigo-700 mb-6">📱 AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="addr" type="text" placeholder="Address">
                    <input id="price" type="text" placeholder="Price">
                    <input id="beds" type="text" placeholder="Beds">
                    <input id="baths" type="text" placeholder="Baths">
                    <textarea id="feat" rows="3" class="md:col-span-2" placeholder="Key Features..."></textarea>
                    <input id="hood" type="text" class="md:col-span-2" placeholder="Neighborhood">
                </div>
                <button onclick="runFinalAI()" id="run-btn" class="mt-4 bg-indigo-600 text-white px-12 py-4 rounded-xl font-bold w-full shadow-lg hover:bg-indigo-700 transition">Generate 7 Posts Now</button>
                <div id="display"></div>
            </div>

            <div id="settings-tab" class="panel hidden">
                <h2 class="text-xl font-bold mb-4">API Configuration</h2>
                <input type="password" id="key-field" placeholder="Paste your AIza... key">
                <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full">Save Key</button>
            </div>

            <div id="other-tab" class="panel hidden py-20 text-center text-gray-400">
                <i class="fas fa-lock text-5xl mb-4"></i>
                <p>Establishing connection with Social Media tool first...</p>
            </div>
        </div>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = (id === 'social' || id === 'settings') ? id + '-tab' : 'other-tab';
            document.getElementById(target).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        function saveKey() {
            localStorage.setItem('V9_STABLE_KEY', document.getElementById('key-field').value.trim());
            alert('✅ Key Saved! Handshake reset.');
            location.reload();
        }

        async function runFinalAI() {
            const key = localStorage.getItem('V9_STABLE_KEY');
            const out = document.getElementById('display');
            if(!key) { alert('Go to Settings first!'); return; }

            out.innerHTML = "<div class='text-indigo-600 font-bold'>✨ Finding stable model route...</div>";
            const prompt = `Realtor AI: Write 7 social media posts for ${document.getElementById('addr').value}. Price: ${document.getElementById('price').value}. Neighborhood: ${document.getElementById('hood').value}. Features: ${document.getElementById('feat').value}.`;

            // ROUTE A: The Most Successful Route for 2026
            const routeA = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`;
            // ROUTE B: The Stable Fallback
            const routeB = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=${key}`;

            const callAI = async (url) => {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                return await response.json();
            };

            try {
                let data = await callAI(routeA);
                
                // If Route A fails with "Not Found", try Route B automatically
                if (data.error && (data.error.code === 404 || data.error.message.includes("not found"))) {
                    console.log("Route A failed, shifting to Route B...");
                    data = await callAI(routeB);
                }

                if (data.candidates && data.candidates[0].content) {
                    const text = data.candidates[0].content.parts[0].text;
                    out.innerHTML = `<div class="output-box">${text.replace(/\*\*/g, '')}</div>`;
                } else {
                    throw new Error(data.error ? data.error.message : "Handshake rejected by Google.");
                }
            } catch (err) {
                out.innerHTML = `<div class="p-6 bg-red-100 text-red-700 mt-4 rounded-xl font-bold">❌ Connection Error: ${err.message}</div>`;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('V9_STABLE_KEY');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
