<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Hub V3.0 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; padding: 10px 15px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="text-right text-white/40 text-xs mb-2">ENGINE STATUS: V3.0_STABLE_V1</div>

        <div class="bg-white rounded-3xl p-6 mb-6 shadow-lg">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">2026-2030 Edition | AI-Powered Hub</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="changeTab('social')" class="nav-btn active" id="btn-social">📱 Social Media Generator</button>
            <button onclick="changeTab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="changeTab('warroom')" class="nav-btn">⚡ War-Room Prompts (25+)</button>
            <button onclick="changeTab('connection')" class="nav-btn">📞 Daily Connection Generator</button>
            <button onclick="changeTab('leads')" class="nav-btn">📊 Lead Tracker</button>
            <button onclick="changeTab('routine')" class="nav-btn">✅ Daily Routine</button>
            <button onclick="changeTab('settings')" class="nav-btn bg-black border-none"><i class="fas fa-cog"></i> Settings</button>
        </div>

        <div class="glass-card p-8 min-h-[500px]">
            <div id="social-view" class="tab-panel">
                <h2 class="text-2xl font-bold text-indigo-700 mb-2">📱 AI Social Media Generator</h2>
                <p class="text-gray-500 mb-6 italic">Generate 7 different social media posts in seconds.</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="f-addr" type="text" placeholder="Property Address (e.g., 123 Main St)">
                    <input id="f-price" type="text" placeholder="Price (e.g., $450,000)">
                    <input id="f-beds" type="text" placeholder="Bedrooms">
                    <input id="f-baths" type="text" placeholder="Bathrooms">
                    <textarea id="f-feat" rows="3" class="md:col-span-2" placeholder="Key Features (comma-separated)"></textarea>
                    <input id="f-hood" type="text" class="md:col-span-2" placeholder="Neighborhood">
                </div>

                <div class="flex gap-2 mt-4">
                    <button onclick="runAI()" id="run-btn" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold shadow-lg">Generate 7 Posts Now</button>
                    <button onclick="location.reload()" class="bg-gray-200 px-10 py-3 rounded-xl font-bold">Clear</button>
                </div>
                <div id="out-area"></div>
            </div>

            <div id="settings-view" class="tab-panel hidden">
                <h2 class="text-2xl font-bold mb-4">⚙️ API Settings</h2>
                <div class="max-w-md">
                    <input type="password" id="key-input" placeholder="Paste AIza... key">
                    <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-2 rounded-lg font-bold w-full">Save Key</button>
                </div>
            </div>

            <div id="other-view" class="tab-panel hidden py-20 text-center text-gray-300">
                <i class="fas fa-hammer text-5xl mb-4"></i>
                <p>Social Media is connected first. We will unlock this tab next!</p>
            </div>
        </div>
    </div>

    <script>
        function changeTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = (id === 'social' || id === 'settings') ? id + '-view' : 'other-view';
            document.getElementById(target).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        function saveKey() {
            localStorage.setItem('STABLE_V1_KEY', document.getElementById('key-input').value.trim());
            alert('✅ Key Saved! Browser updated to V3.0 Stable.');
            location.reload();
        }

        async function runAI() {
            const key = localStorage.getItem('STABLE_V1_KEY');
            const out = document.getElementById('out-area');
            if(!key) { alert('Enter key in Settings!'); return; }

            out.innerHTML = "✨ Connecting to Stable API...";
            const prompt = `Realtor Mode: Create 7 posts for ${document.getElementById('f-addr').value}. Price: ${document.getElementById('f-price').value}. Features: ${document.getElementById('f-feat').value}.`;

            try {
                // THE CRITICAL CHANGE: Forced v1 (not v1beta) and forced gemini-1.5-flash
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<div class="output-box">${text.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 mt-4 rounded-xl">❌ Error: ${err.message}</div>`;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('STABLE_V1_KEY');
            if(saved) document.getElementById('key-input').value = saved;
        };
    </script>
</body>
</html>
