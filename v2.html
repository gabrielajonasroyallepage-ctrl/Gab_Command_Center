<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Hub V10 - Universal Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; padding: 10px 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl p-8 mb-6 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Command Center V10</h1>
            <p class="text-gray-500 font-medium">Auto-Switching Engine (v1beta Optimized)</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="tab('social')" class="nav-btn active">📱 Social Media</button>
            <button onclick="tab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="tab('settings')" class="nav-btn bg-black border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-10">
            <div id="social-tab" class="panel">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="addr" type="text" placeholder="Address">
                    <input id="price" type="text" placeholder="Price">
                    <input id="beds" type="text" placeholder="Beds">
                    <input id="baths" type="text" placeholder="Baths">
                    <textarea id="feat" rows="3" class="md:col-span-2" placeholder="Key Features..."></textarea>
                </div>
                <button onclick="runUltimateAI()" id="run-btn" class="mt-4 bg-indigo-600 text-white px-12 py-4 rounded-xl font-bold w-full shadow-lg">Generate Now</button>
                <div id="display"></div>
            </div>

            <div id="settings-tab" class="panel hidden">
                <input type="password" id="key-field" placeholder="Paste AIza... key">
                <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full">Save Key</button>
            </div>
        </div>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(id + '-tab').classList.remove('hidden');
        }

        function saveKey() {
            localStorage.setItem('RE_V10_KEY', document.getElementById('key-field').value.trim());
            location.reload();
        }

        async function runUltimateAI() {
            const key = localStorage.getItem('RE_V10_KEY');
            const out = document.getElementById('display');
            if(!key) return alert('Set key in Settings');

            out.innerHTML = "🔄 Testing connection routes...";
            const prompt = `Write a listing post for ${document.getElementById('addr').value}`;
            
            // This list covers the names Google actually recognizes for v1beta
            const modelNames = ['gemini-1.5-flash', 'gemini-1.5-flash-latest', 'gemini-pro'];
            let success = false;

            for (let name of modelNames) {
                if (success) break;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${name}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    
                    if (data.candidates) {
                        out.innerHTML = `<div class="output-box">${data.candidates[0].content.parts[0].text}</div>`;
                        success = true;
                    }
                } catch (e) { console.log(`Attempt with ${name} failed.`); }
            }

            if (!success) out.innerHTML = "❌ All connection routes failed. Check your API key permissions.";
        }

        window.onload = () => {
            const saved = localStorage.getItem('RE_V10_KEY');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
