<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Command Center V5.0 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; padding: 10px 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-right text-white/40 text-xs mb-2 font-mono">CORE_ENGINE: GOOGLE_SDK_V5</div>

        <div class="bg-white rounded-3xl p-8 mb-6 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">Official SDK Integration | 2026 Stable</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="tab('social')" class="nav-btn active" id="btn-social">📱 Social Media Generator</button>
            <button onclick="tab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="tab('warroom')" class="nav-btn">⚡ War-Room Prompts (25+)</button>
            <button onclick="tab('connection')" class="nav-btn">📞 Daily Connection</button>
            <button onclick="tab('leads')" class="nav-btn">📊 Lead Tracker</button>
            <button onclick="tab('routine')" class="nav-btn">✅ Daily Routine</button>
            <button onclick="tab('settings')" class="nav-btn bg-black border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-10">
            <div id="social-tab" class="view">
                <h2 class="text-2xl font-bold text-indigo-700 mb-6">📱 AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="addr" type="text" placeholder="Property Address">
                    <input id="price" type="text" placeholder="Price">
                    <input id="beds" type="text" placeholder="Bedrooms">
                    <input id="baths" type="text" placeholder="Bathrooms">
                    <textarea id="feat" rows="4" class="md:col-span-2" placeholder="Key Features..."></textarea>
                    <input id="hood" type="text" class="md:col-span-2" placeholder="Neighborhood">
                </div>
                <button onclick="generatePosts()" id="run-btn" class="mt-4 bg-indigo-600 text-white px-12 py-4 rounded-xl font-bold w-full shadow-lg">Generate 7 Posts Now</button>
                <div id="display"></div>
            </div>

            <div id="settings-tab" class="view hidden">
                <h2 class="text-xl font-bold mb-4">API Settings</h2>
                <div class="max-w-md">
                    <label class="block text-sm font-bold text-gray-600 mb-2">Google AI Key</label>
                    <input type="password" id="key-field" placeholder="Paste AIza... key">
                    <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full mb-4">Save Key</button>
                    
                    <div class="border-t pt-4 mt-4">
                        <p class="text-xs text-gray-400 mb-2">Debug Tool:</p>
                        <button onclick="testKey()" class="text-xs bg-gray-100 text-gray-600 px-4 py-2 rounded-lg hover:bg-gray-200">Test Connection & List Models</button>
                        <div id="debug-out" class="mt-2 text-[10px] font-mono text-gray-500 overflow-auto max-h-40"></div>
                    </div>
                </div>
            </div>

            <div id="other-tab" class="view hidden py-20 text-center text-gray-300 italic">
                Coming soon after Social Media is live!
            </div>
        </div>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
    </script>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // Make functions global so buttons can see them
        window.tab = (id) => {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = (id === 'social' || id === 'settings') ? id + '-tab' : 'other-tab';
            document.getElementById(target).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        };

        window.saveKey = () => {
            const key = document.getElementById('key-field').value.trim();
            localStorage.setItem('SDK_KEY_V5', key);
            alert('✅ Key Saved! Version 5.0 SDK Active.');
            location.reload();
        };

        window.generatePosts = async () => {
            const key = localStorage.getItem('SDK_KEY_V5');
            const out = document.getElementById('display');
            if(!key) { alert('Save key in Settings!'); return; }

            out.innerHTML = "✨ Official SDK connecting to Gemini...";
            
            try {
                const genAI = new GoogleGenerativeAI(key);
                // We use 'gemini-1.5-flash-latest' for maximum compatibility
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash-latest" });
                
                const prompt = `Realtor AI: Write 7 social media posts for ${document.getElementById('addr').value}. Price: ${document.getElementById('price').value}. Features: ${document.getElementById('feat').value}. Neighborhood: ${document.getElementById('hood').value}.`;
                
                const result = await model.generateContent(prompt);
                const response = await result.response;
                const text = response.text();
                
                out.innerHTML = `<div class="output-box">${text.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 mt-4 rounded-xl font-bold">❌ SDK Error: ${err.message}</div>`;
            }
        };

        window.testKey = async () => {
            const key = localStorage.getItem('SDK_KEY_V5');
            const debug = document.getElementById('debug-out');
            debug.innerHTML = "Testing... calling ListModels...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                debug.innerHTML = JSON.stringify(data, null, 2);
            } catch (e) {
                debug.innerHTML = "Critical fail: " + e.message;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('SDK_KEY_V5');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
