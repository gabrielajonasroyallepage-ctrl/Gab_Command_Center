<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Command Center V12 - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; padding: 10px 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; font-size: 1rem; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl p-8 mb-6 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">Legacy Pro Engine | 2026-2030 Edition</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="tab('social')" class="nav-btn active">📱 Social Media Generator</button>
            <button onclick="tab('settings')" class="nav-btn bg-black border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-10 min-h-[500px]">
            <div id="social-tab" class="panel">
                <h2 class="text-2xl font-bold text-indigo-700 mb-6">📱 AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="addr" type="text" placeholder="Property Address">
                    <input id="price" type="text" placeholder="Price">
                    <input id="beds" type="text" placeholder="Beds">
                    <input id="baths" type="text" placeholder="Baths">
                    <textarea id="feat" rows="3" class="md:col-span-2" placeholder="Key Features..."></textarea>
                    <input id="hood" type="text" class="md:col-span-2" placeholder="Neighborhood">
                </div>
                <button onclick="runLegacyPro()" id="run-btn" class="mt-4 bg-indigo-600 text-white px-12 py-4 rounded-xl font-bold w-full shadow-lg hover:scale-[1.01] transition">Generate 7 Posts Now</button>
                <div id="display"></div>
            </div>

            <div id="settings-tab" class="panel hidden">
                <h2 class="text-xl font-bold mb-4">API Configuration</h2>
                <input type="password" id="key-field" placeholder="Paste your AIza... key here">
                <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full">Save and Reset Handshake</button>
            </div>
        </div>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(id + '-tab').classList.remove('hidden');
        }

        function saveKey() {
            localStorage.setItem('RE_PRO_KEY', document.getElementById('key-field').value.trim());
            alert('✅ Key Saved! Handshake reset.');
            location.reload();
        }

        async function runLegacyPro() {
            const key = localStorage.getItem('RE_PRO_KEY');
            const out = document.getElementById('display');
            if(!key) { alert('Go to Settings first!'); return; }

            out.innerHTML = "<div class='text-indigo-600 font-bold italic animate-pulse'>✨ Connecting via Universal Pro Route...</div>";

            const prompt = `Realtor AI: Create 7 posts for ${document.getElementById('addr').value}. Price: ${document.getElementById('price').value}. Neighborhood: ${document.getElementById('hood').value}. Features: ${document.getElementById('feat').value}.`;

            // We are using the most stable v1 route and the most universally accepted model name 'gemini-pro'
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    const text = data.candidates[0].content.parts[0].text;
                    out.innerHTML = `<div class="output-box">${text.replace(/\*\*/g, '')}</div>`;
                } else {
                    out.innerHTML = `<div class="p-6 bg-red-100 text-red-700 mt-4 rounded-xl font-bold">
                        ❌ Connection Failed. <br><br>
                        Error: ${data.error ? data.error.message : "Handshake rejected by Google."}
                    </div>`;
                }
            } catch (e) {
                out.innerHTML = `<div class="p-6 bg-red-100 text-red-700 mt-4 rounded-xl font-bold text-xs font-mono">DEBUG: ${e.message}</div>`;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('RE_PRO_KEY');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
