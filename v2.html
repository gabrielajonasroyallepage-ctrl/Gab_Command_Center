<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Hub V2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; font-weight: bold; padding: 12px 20px; transition: 0.3s; font-size: 0.9rem; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 14px !important; width: 100%; margin-bottom: 12px; }
        .output-box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.8; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-right text-white/50 text-xs font-bold mb-2">SYSTEM: FRESH_V2_DEPLOYED</div>
        
        <div class="bg-white rounded-3xl p-8 mb-8 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">2026-2030 Edition | AI-Powered Hub</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-8">
            <button onclick="tab('social')" class="nav-btn active" id="t-social">📱 Social Media Generator</button>
            <button onclick="tab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="tab('settings')" class="nav-btn bg-black border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-10 min-h-[500px]">
            <div id="social-tab" class="view">
                <h2 class="text-2xl font-bold text-indigo-700 mb-6">AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="addr" type="text" placeholder="Property Address">
                    <input id="price" type="text" placeholder="Price">
                    <textarea id="feat" rows="4" class="md:col-span-2" placeholder="Key Features..."></textarea>
                </div>
                <button onclick="askAI()" id="go-btn" class="mt-4 bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg hover:bg-indigo-700 transition">Generate 7 Posts Now</button>
                <div id="result"></div>
            </div>

            <div id="settings-tab" class="view hidden">
                <h2 class="text-xl font-bold mb-4">API Key Setup</h2>
                <p class="text-gray-500 mb-4 text-sm">Paste your key from Google AI Studio. It must start with 'AIza'.</p>
                <input type="password" id="key-field" placeholder="AIza...">
                <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full shadow-md">Save Key</button>
            </div>
        </div>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id + '-tab').classList.remove('hidden');
        }

        function saveKey() {
            const val = document.getElementById('key-field').value.trim();
            if(!val.startsWith('AIza')) { alert('Invalid Key Format'); return; }
            localStorage.setItem('V2_CLEAN_KEY', val);
            alert('✅ Key Saved! Ready to go.');
        }

        async function askAI() {
            const key = localStorage.getItem('V2_CLEAN_KEY');
            const out = document.getElementById('result');
            if(!key) { alert('Go to Settings first!'); return; }

            out.innerHTML = "✨ AI is connecting...";
            const prompt = "Realtor Pro: Write 7 social media posts for " + document.getElementById('addr').value;

            try {
                // Using the most universal endpoint for 1.5-flash
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                out.innerHTML = `<div class="output-box">${data.candidates[0].content.parts[0].text.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 mt-4 rounded-xl">❌ Connection Error: ${err.message}</div>`;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('V2_CLEAN_KEY');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
