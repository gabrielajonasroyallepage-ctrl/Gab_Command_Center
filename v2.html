<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Hub V11 - Diagnostic Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; padding: 20px; }
        .glass-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 800px; margin: auto; }
        .nav-btn { background: #6366f1; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; margin-right: 5px; }
        input, textarea { border: 1.5px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; margin-bottom: 10px; }
        .error-log { background: #1a1a1a; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1 class="text-2xl font-bold text-indigo-600 mb-4">🚀 RE Command Center V11</h1>
        
        <div class="mb-6">
            <button onclick="tab('main')" class="nav-btn">Generator</button>
            <button onclick="tab('set')" class="nav-btn">Settings</button>
        </div>

        <div id="main-view">
            <input id="addr" placeholder="Address (e.g. 123 Main St)">
            <textarea id="feat" placeholder="Features..."></textarea>
            <button onclick="runDiagnostic()" id="run-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">Run Deep Diagnostic</button>
            <div id="display" class="mt-4"></div>
            <div id="log-container" class="hidden">
                <p class="text-xs font-bold text-red-500 mt-4">RAW SYSTEM LOGS (Show this to me):</p>
                <div id="raw-log" class="error-log"></div>
            </div>
        </div>

        <div id="set-view" class="hidden">
            <input type="password" id="key-field" placeholder="Paste AIza... key">
            <button onclick="saveKey()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold">Save Key</button>
        </div>
    </div>

    <script>
        function tab(v) {
            document.getElementById('main-view').classList.toggle('hidden', v !== 'main');
            document.getElementById('set-view').classList.toggle('hidden', v !== 'set');
        }

        function saveKey() {
            localStorage.setItem('RE_V11_KEY', document.getElementById('key-field').value.trim());
            alert('Key Saved!');
        }

        async function runDiagnostic() {
            const key = localStorage.getItem('RE_V11_KEY');
            const log = document.getElementById('raw-log');
            const display = document.getElementById('display');
            const container = document.getElementById('log-container');
            
            if(!key) return alert('No key found in Settings!');
            
            display.innerHTML = "🌀 Probing Google Servers...";
            container.classList.remove('hidden');
            log.innerHTML = "Starting diagnostics...\n";

            const routes = [
                {v: 'v1beta', m: 'gemini-1.5-flash'},
                {v: 'v1', m: 'gemini-1.5-flash-latest'}
            ];

            for(let r of routes) {
                log.innerHTML += `Checking: ${r.v} with ${r.m}...\n`;
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/${r.v}/models/${r.m}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({contents:[{parts:[{text:"hi"}]}]})
                    });
                    const data = await res.json();
                    
                    if(data.candidates) {
                        display.innerHTML = "✅ SUCCESS! Connection established.";
                        log.innerHTML += "SUCCESS: Model responded correctly.";
                        return;
                    } else {
                        log.innerHTML += `FAILED: ${JSON.stringify(data.error)}\n\n`;
                    }
                } catch (e) {
                    log.innerHTML += `ERROR: ${e.message}\n`;
                }
            }
            display.innerHTML = "❌ Connection Refused by Google.";
        }

        window.onload = () => {
            const saved = localStorage.getItem('RE_V11_KEY');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
