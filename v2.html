<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Hub V8.0 - Auto-Solver</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; transition: 0.3s; padding: 10px 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-right text-white/40 text-[10px] mb-2 font-mono">CORE_ENGINE: AUTO_SOLVER_V8</div>

        <div class="bg-white rounded-3xl p-8 mb-6 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">2026-2030 Edition | AI-Powered Hub</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="tab('social')" class="nav-btn active" id="b-social">📱 Social Media Generator</button>
            <button onclick="tab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="tab('warroom')" class="nav-btn">⚡ War-Room Prompts (25+)</button>
            <button onclick="tab('leads')" class="nav-btn">📊 Lead Tracker</button>
            <button onclick="tab('routine')" class="nav-btn">✅ Daily Routine</button>
            <button onclick="tab('settings')" class="nav-btn bg-black border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-10 min-h-[500px]">
            <div id="social-tab" class="panel">
                <h2 class="text-2xl font-bold text-indigo-700 mb-6">📱 AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="addr" type="text" placeholder="Property Address (e.g., 123 Main St)">
                    <input id="price" type="text" placeholder="Price (e.g., $450,000)">
                    <input id="beds" type="text" placeholder="Bedrooms">
                    <input id="baths" type="text" placeholder="Bathrooms">
                    <textarea id="feat" rows="3" class="md:col-span-2" placeholder="Key Features (e.g., Garage, Pool, New Kitchen)"></textarea>
                    <input id="hood" type="text" class="md:col-span-2" placeholder="Neighborhood">
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="solveAndRun()" id="run-btn" class="bg-indigo-600 text-white px-12 py-4 rounded-xl font-bold flex-1 shadow-lg">Generate 7 Posts Now</button>
                    <button onclick="location.reload()" class="bg-gray-100 px-8 py-4 rounded-xl font-bold">Clear</button>
                </div>
                <div id="display"></div>
            </div>

            <div id="settings-tab" class="panel hidden">
                <h2 class="text-xl font-bold mb-4">API Settings</h2>
                <input type="password" id="key-field" placeholder="Paste your AIza... key here">
                <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full">Save and Verify Key</button>
            </div>

            <div id="other-tab" class="panel hidden py-20 text-center text-gray-400">
                <i class="fas fa-lock text-5xl mb-4"></i>
                <p>Social Media Generator must work before these tools unlock.</p>
            </div>
        </div>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = (id === 'social' || id === 'settings') ? id + '-tab' : 'other-tab';
            document.getElementById(target).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        function saveKey() {
            localStorage.setItem('AUTO_SOLVE_KEY', document.getElementById('key-field').value.trim());
            alert('✅ Key Saved! Now try generating a post.');
            location.reload();
        }

        async function solveAndRun() {
            const key = localStorage.getItem('AUTO_SOLVE_KEY');
            const out = document.getElementById('display');
            if(!key) { alert('Go to Settings first!'); return; }

            out.innerHTML = "<div class='text-indigo-600 font-bold italic animate-pulse'>✨ Testing all possible connection routes for your key...</div>";
            
            const prompt = `Realtor Mode: Create 7 posts for ${document.getElementById('addr').value}. Price: ${document.getElementById('price').value}. Neighborhood: ${document.getElementById('hood').value}. Features: ${document.getElementById('feat').value}.`;

            // THE COMBINATION LIST: This covers every possible reason for that error
            const combinations = [
                { v: 'v1beta', m: 'gemini-1.5-flash-latest' },
                { v: 'v1', m: 'gemini-1.5-flash-latest' },
                { v: 'v1beta', m: 'gemini-1.5-flash' },
                { v: 'v1', m: 'gemini-1.5-flash' },
                { v: 'v1beta', m: 'gemini-1.5-pro' },
                { v: 'v1', m: 'gemini-pro' }
            ];

            let foundRoute = false;

            for (let route of combinations) {
                if (foundRoute) break;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/${route.v}/models/${route.m}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content) {
                        const content = data.candidates[0].content.parts[0].text;
                        out.innerHTML = `<div class="output-box">${content.replace(/\*\*/g, '')}</div>`;
                        foundRoute = true;
                        console.log(`Success route: ${route.v}/${route.m}`);
                    }
                } catch (e) { continue; }
            }

            if (!foundRoute) {
                out.innerHTML = `<div class="p-6 bg-red-100 text-red-700 mt-4 rounded-xl font-bold">
                    ❌ FAILED ALL ROUTES. <br><br>
                    Your API Key was rejected by every version of Google Gemini. <br><br>
                    1. Ensure your key is from 'Google AI Studio', not 'Google Cloud'.<br>
                    2. Check if your account has been restricted by Google.
                </div>`;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('AUTO_SOLVE_KEY');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
