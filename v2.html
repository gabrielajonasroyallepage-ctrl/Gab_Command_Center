<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Command Center V4.0 - MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; transition: 0.3s; padding: 10px 15px; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-right text-white/40 text-xs mb-2 font-mono">DEBUG_MODE: V4.0_MULTI_ROUTE</div>

        <div class="bg-white rounded-3xl p-8 mb-6 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">Official AI Workspace - STABLE V4</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="tab('social')" class="nav-btn active" id="btn-social">📱 Social Media Generator</button>
            <button onclick="tab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="tab('warroom')" class="nav-btn">⚡ War-Room Prompts (25+)</button>
            <button onclick="tab('settings')" class="nav-btn bg-black border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-10 min-h-[500px]">
            <div id="social-tab" class="view">
                <h2 class="text-2xl font-bold text-indigo-700 mb-6 flex items-center gap-2">📱 AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="addr" type="text" placeholder="Property Address">
                    <input id="price" type="text" placeholder="Price">
                    <textarea id="feat" rows="4" class="md:col-span-2" placeholder="Key Features..."></textarea>
                </div>
                <button onclick="generate()" id="run-btn" class="mt-4 bg-indigo-600 text-white px-12 py-4 rounded-xl font-bold w-full shadow-lg hover:bg-indigo-700 transition">Generate 7 Posts Now</button>
                <div id="display"></div>
            </div>

            <div id="settings-tab" class="view hidden">
                <h2 class="text-xl font-bold mb-4">API Settings</h2>
                <input type="password" id="key-field" placeholder="Paste your AIza... key">
                <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full">Save & Reset Connection</button>
            </div>
        </div>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(id + '-tab').classList.remove('hidden');
        }

        function saveKey() {
            localStorage.setItem('MASTER_KEY_V4', document.getElementById('key-field').value.trim());
            alert('✅ Key Reset! Trying new connection routes...');
            location.reload();
        }

        async function generate() {
            const key = localStorage.getItem('MASTER_KEY_V4');
            const out = document.getElementById('display');
            if(!key) { alert('Go to Settings!'); return; }

            out.innerHTML = "✨ AI is trying multiple connection routes...";
            const prompt = "Realtor Pro: Write 7 social media posts for " + document.getElementById('addr').value;

            // STRATEGY: Try different versions and model names automatically
            const routes = [
                { ver: 'v1beta', mod: 'gemini-1.5-flash' },
                { ver: 'v1', mod: 'gemini-1.5-flash' },
                { ver: 'v1beta', mod: 'gemini-pro' }
            ];

            let success = false;

            for (let route of routes) {
                if (success) break;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/${route.ver}/models/${route.mod}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    if(data.error) continue; // Try next route

                    out.innerHTML = `<div class="output-box">${data.candidates[0].content.parts[0].text}</div>`;
                    success = true;
                } catch (e) { console.log('Route failed, trying next...'); }
            }

            if (!success) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 mt-4 rounded-xl font-bold">❌ All 3 connection routes failed. <br><br> 1. Check if your API Key in Settings has a space at the end. <br> 2. Ensure your key is from Google AI Studio (Gemini), not Google Cloud (Vertex AI).</div>`;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('MASTER_KEY_V4');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
