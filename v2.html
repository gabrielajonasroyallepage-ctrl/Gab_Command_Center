<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Command Center V2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 10px; font-weight: bold; transition: 0.3s; padding: 10px 15px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea, select { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl p-6 mb-6 shadow-lg">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">2026-2030 Edition | AI-Powered Hub</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="switchTab('social')" class="nav-btn active" id="btn-social">📱 Social Media Generator</button>
            <button onclick="switchTab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="switchTab('warroom')" class="nav-btn">⚡ War-Room Prompts (25+)</button>
            <button onclick="switchTab('connection')" class="nav-btn">📞 Daily Connection Generator</button>
            <button onclick="switchTab('leads')" class="nav-btn">📊 Lead Tracker</button>
            <button onclick="switchTab('routine')" class="nav-btn">✅ Daily Routine</button>
            <button onclick="switchTab('settings')" class="nav-btn bg-slate-900 border-none"><i class="fas fa-cog"></i> Settings</button>
        </div>

        <div class="glass-card p-8 min-h-[500px]">
            <div id="social-tab" class="tab-content">
                <h2 class="text-2xl font-bold text-indigo-700 mb-4 italic">📱 AI Social Media Generator</h2>
                <p class="text-gray-600 mb-6">Generate 7 different social media posts in seconds. Just enter property details.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <input id="in-addr" type="text" placeholder="Property Address">
                    <input id="in-price" type="text" placeholder="Price">
                    <input id="in-beds" type="number" placeholder="Bedrooms">
                    <input id="in-baths" type="number" placeholder="Bathrooms">
                    <textarea id="in-feat" rows="3" class="md:col-span-2" placeholder="Key Features (comma-separated)"></textarea>
                    <input id="in-hood" type="text" class="md:col-span-2" placeholder="Neighborhood">
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="runCommand('social')" id="go-social" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold">Generate 7 Posts Now</button>
                    <button onclick="location.reload()" class="bg-gray-200 px-8 py-3 rounded-xl font-bold">Clear</button>
                </div>
                <div id="out-social"></div>
            </div>

            <div id="settings-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">API Configuration</h2>
                <div class="max-w-md">
                    <input type="password" id="api-key-input" placeholder="Paste your AIza... key">
                    <button onclick="saveKey()" class="bg-green-600 text-white px-8 py-2 rounded-lg font-bold w-full">Save Key</button>
                </div>
            </div>

            <div id="other-tab" class="tab-content hidden py-20 text-center text-gray-400">
                <i class="fas fa-hammer text-5xl mb-4"></i>
                <p>Social Media logic is first! We will activate this button next once the AI responds.</p>
            </div>
        </div>
    </div>

    <script>
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = (id === 'social' || id === 'settings') ? id + '-tab' : 'other-tab';
            document.getElementById(target).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        function saveKey() {
            localStorage.setItem('RE_FINAL_KEY', document.getElementById('api-key-input').value.trim());
            alert('✅ Key Saved!');
            location.reload();
        }

        async function runCommand(mode) {
            const key = localStorage.getItem('RE_FINAL_KEY');
            if(!key) { alert('Go to Settings first!'); return; }

            const out = document.getElementById('out-social');
            const btn = document.getElementById('go-social');
            btn.disabled = true;
            out.innerHTML = "✨ Processing...";

            const prompt = `Act as a top Real Estate Marketer. Create 7 social media posts for: ${document.getElementById('in-addr').value}. Price: ${document.getElementById('in-price').value}. Features: ${document.getElementById('in-feat').value}.`;

            try {
                // THE FIX: Changed from v1beta to v1 for stability
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<div class="output-box">${text.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg mt-4">❌ Error: ${err.message}</div>`;
            } finally { btn.disabled = false; }
        }

        window.onload = () => {
            const saved = localStorage.getItem('RE_FINAL_KEY');
            if(saved) document.getElementById('api-key-input').value = saved;
        };
    </script>
</body>
</html>
