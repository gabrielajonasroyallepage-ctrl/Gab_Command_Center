<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Command Center V2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; } 
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; font-weight: bold; transition: 0.2s; padding: 10px 20px; }
        .nav-btn:hover { background: #4f46e5; transform: translateY(-1px); }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e5e7eb !important; border-radius: 10px !important; padding: 12px !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl p-8 mb-8 shadow-lg">
            <h1 class="text-4xl font-extrabold text-[#6366f1] mb-2 flex items-center gap-3">
                🚀 Real Estate Agent Command Center V2 Pro
            </h1>
            <p class="text-gray-500 font-medium">2026-2030 Edition | AI-Powered Hub</p>
        </div>

        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="showTab('social')" class="nav-btn active" id="btn-social">📱 Social Media Generator</button>
            <button onclick="showTab('objection')" class="nav-btn" id="btn-objection">🛡️ Objection Bot</button>
            <button onclick="showTab('warroom')" class="nav-btn">⚡ War-Room Prompts (25+)</button>
            <button onclick="showTab('leads')" class="nav-btn">📊 Lead Tracker</button>
            <button onclick="showTab('settings')" class="nav-btn bg-black text-white border-none" id="btn-settings"><i class="fas fa-cog"></i> Settings</button>
        </div>

        <div class="glass-card p-10">
            
            <div id="social-tab" class="tab-content">
                <h2 class="text-3xl font-bold text-[#6366f1] mb-6">📱 AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <input id="addr" type="text" placeholder="Property Address" class="w-full">
                        <input id="price" type="text" placeholder="Price" class="w-full">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="beds" type="text" placeholder="Beds" class="w-full">
                            <input id="baths" type="text" placeholder="Baths" class="w-full">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <textarea id="features" rows="5" placeholder="Key Features (Pool, View, etc.)" class="w-full"></textarea>
                    </div>
                </div>
                <div class="mt-8 flex gap-4">
                    <button onclick="runGemini()" id="mainBtn" class="bg-[#6366f1] text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 shadow-lg">Generate 7 Posts Now</button>
                </div>
                <div id="output" class="mt-10"></div>
            </div>

            <div id="settings-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">API Settings</h2>
                <input type="password" id="apiKeyInput" class="w-full mb-4 max-w-md block" placeholder="Paste Gemini Key Here">
                <button onclick="saveKey()" class="bg-green-600 text-white px-6 py-2 rounded-lg font-bold">Save Key</button>
            </div>

            <div id="objection-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">🛡️ Objection Bot</h2>
                <textarea id="objectionInput" rows="3" placeholder="Paste the client's objection here (e.g., 'The commission is too high')" class="w-full mb-4"></textarea>
                <button onclick="runObjection()" id="objBtn" class="bg-orange-500 text-white px-10 py-4 rounded-xl font-bold">Get Rebuttal</button>
                <div id="objOutput" class="mt-10"></div>
            </div>

        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.remove('hidden');
            // Find the button that was clicked to give it the white style
            if(event) event.currentTarget.classList.add('active');
        }

        function saveKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('my_gemini_key', key);
            alert('✅ Key Saved!');
        }

        async function callGemini(promptText, outputId, buttonId) {
            const key = localStorage.getItem('my_gemini_key');
            const out = document.getElementById(outputId);
            const btn = document.getElementById(buttonId);

            if(!key) { alert('Save your key in Settings first!'); return; }

            btn.disabled = true;
            out.innerHTML = "✨ AI is thinking...";

            try {
                // CHANGED: Using v1 stable and gemini-pro which is highly compatible
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const resultText = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<div class="bg-indigo-50 p-6 rounded-xl border-2 border-indigo-200 whitespace-pre-wrap">${resultText}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg">❌ Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = buttonId === 'mainBtn' ? "Generate 7 Posts Now" : "Get Rebuttal";
            }
        }

        function runGemini() {
            const prompt = `Act as a Real Estate Marketing Expert. Create 7 social media posts for: ${document.getElementById('addr').value}. Price: ${document.getElementById('price').value}. Features: ${document.getElementById('features').value}`;
            callGemini(prompt, 'output', 'mainBtn');
        }

        function runObjection() {
            const prompt = `Act as a luxury real estate coach. Provide 3 professional rebuttals for this client objection: ${document.getElementById('objectionInput').value}`;
            callGemini(prompt, 'objOutput', 'objBtn');
        }

        window.onload = () => {
            const saved = localStorage.getItem('my_gemini_key');
            if(saved) document.getElementById('apiKeyInput').value = saved;
        };
    </script>
</body>
</html>
