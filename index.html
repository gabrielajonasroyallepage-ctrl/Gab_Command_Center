<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Command Center V2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; } 
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; font-weight: bold; transition: 0.2s; padding: 12px 20px; font-size: 0.9rem; }
        .nav-btn:hover { background: #4f46e5; transform: translateY(-2px); }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { border: 1.5px solid #e5e7eb !important; border-radius: 10px !important; padding: 12px !important; width: 100%; transition: 0.3s; }
        input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .output-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 15px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1f2937; line-height: 1.7; font-size: 1.05rem; position: relative; }
        .copy-badge { position: absolute; top: 10px; right: 10px; background: #6366f1; color: white; padding: 4px 12px; rounded: 20px; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl p-6 mb-8 shadow-lg border-b-4 border-indigo-200">
            <h1 class="text-3xl font-extrabold text-[#6366f1] flex items-center gap-3">
                🚀 Real Estate Agent Command Center V2 Pro
            </h1>
            <p class="text-gray-500 font-medium">2026-2030 Edition | Official AI Workspace</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-8">
            <button onclick="showTab('social')" class="nav-btn active" id="btn-social">📱 Social Media Generator</button>
            <button onclick="showTab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="showTab('connection')" class="nav-btn">📞 Connection Script</button>
            <button onclick="showTab('settings')" class="nav-btn bg-slate-900 text-white border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-6 md:p-10">
            
            <div id="social-tab" class="tab-content">
                <h2 class="text-2xl font-bold text-[#6366f1] mb-6 flex items-center gap-2">📱 AI Social Media Content Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Property Address</label>
                        <input id="addr" type="text" placeholder="123 Main St, Downtown">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Price</label>
                        <input id="price" type="text" placeholder="$750,000">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Beds/Baths</label>
                        <input id="beds" type="text" placeholder="3 Bed / 2 Bath">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Neighborhood</label>
                        <input id="hood" type="text" placeholder="Sunset Valley">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-gray-700 mb-1">Key Features</label>
                        <textarea id="features" rows="4" placeholder="Swimming pool, newly renovated kitchen, large balcony, no noise..."></textarea>
                    </div>
                </div>
                <button onclick="generateSocial()" id="socialBtn" class="mt-8 bg-[#6366f1] text-white px-10 py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 w-full shadow-lg transition flex items-center justify-center gap-2">
                    <i class="fas fa-magic"></i> Generate 7 Posts Now
                </button>
                <div id="socialOutput"></div>
            </div>

            <div id="settings-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">API Configuration</h2>
                <div class="max-w-md">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Gemini API Key</label>
                    <input type="password" id="apiKeyInput" class="mb-4" placeholder="AIza...">
                    <button onclick="saveKey()" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold w-full">Save and Refresh</button>
                </div>
            </div>

            <div id="objection-tab" class="tab-content hidden py-10 text-center">
                <h2 class="text-2xl font-bold text-indigo-700">🛡️ Objection Bot</h2>
