<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center V2 - STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; font-weight: bold; padding: 12px 20px; transition: 0.2s; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 14px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.8; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl p-8 mb-8 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Command Center</h1>
            <p class="text-gray-500 font-medium">STABLE VERSION 2026</p>
        </div>

        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="showTab('social')" class="nav-btn active" id="btn-social">📱 Social Media</button>
            <button onclick="showTab('settings')" class="nav-btn bg-black border-none"><i class="fas fa-cog"></i> Settings</button>
        </div>

        <div class="glass-card p-10 min-h-[500px]">
            <div id="social-tab" class="tab-panel">
                <input id="addr" type="text" placeholder="Property Address">
                <input id="price" type="text" placeholder="Price">
                <textarea id="features" rows="4" placeholder="Features..."></textarea>
                <button onclick="generate()" id="gen-btn" class="bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg">Generate 7 Posts Now</button>
                <div id="out"></div>
            </div>

            <div id="settings-tab" class="tab-panel hidden">
                <h2 class="text-xl font-bold mb-4">API Settings</h2>
                <input type="password" id="key-input" placeholder="Paste AIza... key here">
                <button onclick="save()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full">Save Key</button>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(id + '-tab').classList.remove('hidden');
        }

        function save() {
            // New storage name to bypass the "Invalid Key" cache
            localStorage.setItem('GEMINI_V2_FINAL_KEY', document.getElementById('key-input').value.trim());
            alert('✅ Key Saved! Now try the Social Media tab.');
            location.reload();
        }

        async function generate() {
            const key = localStorage.getItem('GEMINI_V2_FINAL_KEY');
            const btn = document.getElementById('gen-btn');
            const out = document.getElementById('out');

            if(!key) { alert('Go to Settings first!'); return; }

            btn.disabled = true;
            out.innerHTML = "✨ AI is thinking...";

            try {
                // FORCE: v1 address AND gemini-1.5-flash model name
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Write 7 real estate posts for: " + document.getElementById('addr').value }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                out.innerHTML = `<div class="output-box">${data.candidates[0].content.parts[0].text}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 mt-4 rounded-lg">❌ Connection Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('GEMINI_V2_FINAL_KEY');
            if(saved) document.getElementById('key-input').value = saved;
        };
    </script>
</body>
</html>
