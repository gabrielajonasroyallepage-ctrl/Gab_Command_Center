<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Command Center V2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; } 
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; font-weight: bold; transition: 0.2s; padding: 12px 20px; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e5e7eb !important; border-radius: 10px !important; padding: 12px !important; width: 100%; }
        .output-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 15px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1f2937; line-height: 1.7; position: relative; }
    </style>
</head>
<body class="p-4 md:p-10 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl p-6 mb-8 shadow-lg">
            <h1 class="text-3xl font-extrabold text-[#6366f1]">🚀 Real Estate Command Center V2 Pro</h1>
            <p class="text-gray-500">Official AI Workspace</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-8">
            <button onclick="showTab('social')" class="nav-btn active">📱 Social Media</button>
            <button onclick="showTab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="showTab('connection')" class="nav-btn">📞 Script Gen</button>
            <button onclick="showTab('settings')" class="nav-btn bg-slate-900 text-white border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-6 md:p-10">
            
            <div id="social-tab" class="tab-content">
                <h2 class="text-2xl font-bold text-[#6366f1] mb-6">📱 Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input id="addr" type="text" placeholder="Property Address">
                    <input id="price" type="text" placeholder="Price">
                    <textarea id="features" rows="4" class="md:col-span-2" placeholder="Key Features..."></textarea>
                </div>
                <button onclick="runAI('social')" id="socialBtn" class="mt-6 bg-[#6366f1] text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg transition">Generate 7 Posts Now</button>
                <div id="socialOutput"></div>
            </div>

            <div id="objection-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold text-orange-600 mb-6">🛡️ Objection Bot</h2>
                <textarea id="objInput" rows="3" placeholder="What did the client say?"></textarea>
                <button onclick="runAI('objection')" id="objBtn" class="mt-4 bg-orange-500 text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg">Get Rebuttal</button>
                <div id="objOutput"></div>
            </div>

            <div id="connection-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold text-green-600 mb-6">📞 Connection Script</h2>
                <input id="conInput" type="text" placeholder="Who are you calling? (e.g. Past client)">
                <button onclick="runAI('connection')" id="conBtn" class="mt-4 bg-green-600 text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg">Generate Script</button>
                <div id="conOutput"></div>
            </div>

            <div id="settings-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">Settings</h2>
                <input type="password" id="apiKeyInput" class="max-w-md block mb-4" placeholder="Paste Gemini Key (AIza...)">
                <button onclick="saveKey()" class="bg-black text-white px-6 py-3 rounded-lg font-bold">Save Key</button>
            </div>

        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        function saveKey() {
            localStorage.setItem('gemini_key_v3', document.getElementById('apiKeyInput').value.trim());
            alert('✅ Key Saved!');
        }

        async function runAI(type) {
            const key = localStorage.getItem('gemini_key_v3');
            if(!key) { alert('Go to Settings first!'); return; }

            let prompt = "";
            let outId = "";
            let btnId = "";

            if(type === 'social') {
                prompt = `Create 7 social media posts for real estate: ${document.getElementById('addr').value}. Price: ${document.getElementById('price').value}. Features: ${document.getElementById('features').value}`;
                outId = "socialOutput"; btnId = "socialBtn";
            } else if(type === 'objection') {
                prompt = `Provide 3 professional real estate rebuttals for: ${document.getElementById('objInput').value}`;
                outId = "objOutput"; btnId = "objBtn";
            } else {
                prompt = `Create a phone script for reaching out to: ${document.getElementById('conInput').value}`;
                outId = "conOutput"; btnId = "conBtn";
            }

            const btn = document.getElementById(btnId);
            const out = document.getElementById(outId);
            btn.disabled = true;
            out.innerHTML = "✨ AI is working...";

            try {
                // THE STABLE FIX: Using 'v1' and 'gemini-pro'
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<div class="output-box">${text.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="mt-6 p-4 bg-red-100 text-red-700 rounded-lg">❌ Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Done!";
                setTimeout(() => { btn.innerText = "Run Again"; }, 2000);
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('gemini_key_v3');
            if(saved) document.getElementById('apiKeyInput').value = saved;
        };
    </script>
</body>
</html>
