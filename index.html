<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE Command Center V3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: 'Inter', sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 12px; font-weight: bold; padding: 12px 20px; transition: 0.3s; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 14px !important; width: 100%; margin-bottom: 12px; }
        .output-box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1e293b; line-height: 1.8; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <div class="text-right text-white/50 text-xs font-bold mb-2">SYSTEM STATUS: V3.1 CONNECTED</div>
        <div class="bg-white rounded-3xl p-8 mb-8 shadow-xl">
            <h1 class="text-3xl font-extrabold text-indigo-600">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 font-medium">2026-2030 Edition | AI-Powered Hub</p>
        </div>
        <div class="flex flex-wrap gap-3 mb-8">
            <button onclick="changeTab('social')" class="nav-btn active" id="tab-social">📱 Social Media Generator</button>
            <button onclick="changeTab('settings')" class="nav-btn bg-slate-900 border-none">⚙️ Settings</button>
        </div>
        <div class="glass-card p-10 min-h-[500px]">
            <div id="social-content" class="tab-panel">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="in-addr" type="text" placeholder="Property Address">
                    <input id="in-price" type="text" placeholder="Price">
                    <textarea id="in-feat" rows="4" class="md:col-span-2" placeholder="Key Features..."></textarea>
                </div>
                <button onclick="runGemini()" id="run-btn" class="mt-4 bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg">Generate 7 Posts Now</button>
                <div id="out-area"></div>
            </div>
            <div id="settings-content" class="tab-panel hidden">
                <h2 class="text-xl font-bold mb-4">API Key Configuration</h2>
                <input type="password" id="api-field" placeholder="Paste your AIza... key">
                <button onclick="saveFinalKey()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold w-full">Save and Synchronize</button>
            </div>
        </div>
    </div>
    <script>
        function changeTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.getElementById(id + '-content').classList.remove('hidden');
        }
        function saveFinalKey() {
            const val = document.getElementById('api-field').value.trim();
            localStorage.setItem('GEMINI_FINAL_STORAGE', val);
            alert('✅ Key Cleaned and Saved!');
            location.reload();
        }
        async function runGemini() {
            const key = localStorage.getItem('GEMINI_FINAL_STORAGE');
            const btn = document.getElementById('run-btn');
            const out = document.getElementById('out-area');
            if(!key) { alert('Go to Settings first!'); return; }
            btn.disabled = true;
            out.innerHTML = "✨ Calling Google AI...";
            const prompt = "Create 7 social media posts for: " + document.getElementById('in-addr').value;
            try {
                // FIXED ENDPOINT: Using v1beta with gemini-1.5-flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                out.innerHTML = `<div class="output-box">${data.candidates[0].content.parts[0].text.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-100 text-red-700 mt-4 rounded-xl">❌ Connection Error: ${err.message}</div>`;
            } finally { btn.disabled = false; }
        }
        window.onload = () => {
            const saved = localStorage.getItem('GEMINI_FINAL_STORAGE');
            if(saved) document.getElementById('api-field').value = saved;
        };
    </script>
</body>
</html>
