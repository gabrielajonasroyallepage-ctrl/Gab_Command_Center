<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Command Center V2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; } 
        .glass-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; font-weight: bold; transition: 0.2s; padding: 12px 20px; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e5e7eb !important; border-radius: 10px !important; padding: 12px !important; width: 100%; }
        .output-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 15px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1f2937; line-height: 1.7; position: relative; }
    </style>
</head>
<body class="p-4 md:p-10 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl p-6 mb-8 shadow-lg">
            <h1 class="text-3xl font-extrabold text-[#6366f1]">🚀 Real Estate Command Center V2 Pro</h1>
            <p class="text-gray-500">Official AI Workspace - STABLE V1</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-8">
            <button onclick="changeTab('social')" class="nav-btn active" id="tab-social-btn">📱 Social Media</button>
            <button onclick="changeTab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="changeTab('settings')" class="nav-btn bg-slate-900 text-white border-none">⚙️ Settings</button>
        </div>

        <div class="glass-card p-6 md:p-10">
            
            <div id="social-tab" class="tab-panel">
                <h2 class="text-2xl font-bold text-[#6366f1] mb-6">📱 Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <input id="prop-addr" type="text" placeholder="Property Address">
                    <input id="prop-price" type="text" placeholder="Price">
                    <textarea id="prop-features" rows="4" class="md:col-span-2" placeholder="Key Features..."></textarea>
                </div>
                <button onclick="triggerGemini('social')" id="social-go" class="mt-6 bg-[#6366f1] text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg">Generate 7 Posts Now</button>
                <div id="social-result"></div>
            </div>

            <div id="objection-tab" class="tab-panel hidden">
                <h2 class="text-2xl font-bold text-orange-600 mb-6">🛡️ Objection Bot</h2>
                <textarea id="obj-text" rows="3" placeholder="What did the client say?"></textarea>
                <button onclick="triggerGemini('objection')" id="obj-go" class="mt-4 bg-orange-500 text-white px-10 py-4 rounded-xl font-bold w-full shadow-lg">Get Rebuttal</button>
                <div id="obj-result"></div>
            </div>

            <div id="settings-tab" class="tab-panel hidden">
                <h2 class="text-2xl font-bold mb-4">Settings</h2>
                <input type="password" id="api-key-box" class="max-w-md block mb-4" placeholder="Paste Gemini Key (AIza...)">
                <button onclick="saveApiAuth()" class="bg-black text-white px-6 py-3 rounded-lg font-bold">Save Final Key</button>
            </div>

        </div>
    </div>

    <script>
        function changeTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-tab').classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        function saveApiAuth() {
            const val = document.getElementById('api-key-box').value.trim();
            localStorage.setItem('GEMINI_STABLE_KEY', val);
            alert('✅ Key Saved! Browser updated.');
        }

        async function triggerGemini(mode) {
            const key = localStorage.getItem('GEMINI_STABLE_KEY');
            if(!key) { alert('Go to Settings first!'); return; }

            let prompt = "";
            let targetDiv = "";
            let targetBtn = "";

            if(mode === 'social') {
                prompt = "Create 7 luxury real estate social posts for: " + document.getElementById('prop-addr').value;
                targetDiv = "social-result"; targetBtn = "social-go";
            } else {
                prompt = "Provide a real estate rebuttal for: " + document.getElementById('obj-text').value;
                targetDiv = "obj-result"; targetBtn = "obj-go";
            }

            const btn = document.getElementById(targetBtn);
            const out = document.getElementById(targetDiv);
            btn.disabled = true;
            out.innerHTML = "✨ Requesting from Gemini V1 Stable...";

            try {
                // EXPLICIT STABLE URL
                const endpoint = `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${key}`;
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const finalResponse = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<div class="output-box">${finalResponse.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="mt-6 p-4 bg-red-100 text-red-700 rounded-lg">❌ Connection Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Done!";
                setTimeout(() => { btn.innerText = mode === 'social' ? "Generate 7 Posts Now" : "Get Rebuttal"; }, 2000);
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('GEMINI_STABLE_KEY');
            if(saved) document.getElementById('api-key-box').value = saved;
        };
    </script>
</body>
</html>
