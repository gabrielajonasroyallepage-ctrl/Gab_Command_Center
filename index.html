<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Agent Command Center V2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; font-family: sans-serif; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 10px; font-weight: bold; transition: 0.2s; padding: 10px 20px; }
        .nav-btn.active { background: white !important; color: #6366f1 !important; border: 2px solid #6366f1 !important; }
        input, textarea { border: 1.5px solid #e5e7eb !important; border-radius: 10px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; }
        .output-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 15px; padding: 25px; margin-top: 20px; white-space: pre-wrap; color: #1f2937; line-height: 1.7; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl p-6 mb-6 shadow-lg">
            <h1 class="text-3xl font-bold text-indigo-600 flex items-center gap-3">🚀 Real Estate Agent Command Center V2 Pro</h1>
            <p class="text-gray-500 mt-1 font-medium text-sm">2026-2030 Edition | AI-Powered Hub</p>
        </div>

        <div class="flex flex-wrap gap-2 mb-6">
            <button onclick="showTab('social')" class="nav-btn active" id="tab-social">📱 Social Media Generator</button>
            <button onclick="showTab('objection')" class="nav-btn">🛡️ Objection Bot</button>
            <button onclick="showTab('warroom')" class="nav-btn">⚡ War-Room Prompts (25+)</button>
            <button onclick="showTab('connection')" class="nav-btn">📞 Daily Connection Generator</button>
            <button onclick="showTab('leads')" class="nav-btn">📊 Lead Tracker</button>
            <button onclick="showTab('routine')" class="nav-btn">✅ Daily Routine</button>
            <button onclick="showTab('settings')" class="nav-btn bg-black border-none"><i class="fas fa-cog"></i> Settings</button>
        </div>

        <div class="glass-card p-8 min-h-[500px]">
            
            <div id="social-panel" class="tab-panel">
                <h2 class="text-2xl font-bold text-indigo-700 mb-4">📱 AI Social Media Generator</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input id="f-addr" type="text" placeholder="Property Address">
                    <input id="f-price" type="text" placeholder="Price">
                    <input id="f-beds" type="text" placeholder="Bedrooms">
                    <input id="f-baths" type="text" placeholder="Bathrooms">
                    <textarea id="f-features" rows="3" class="md:col-span-2" placeholder="Key Features (comma-separated)"></textarea>
                </div>
                <button onclick="runCommand('social')" id="btn-social" class="mt-4 bg-indigo-600 text-white px-10 py-4 rounded-xl font-bold shadow-lg">Generate 7 Posts Now</button>
                <div id="out-social"></div>
            </div>

            <div id="settings-panel" class="tab-panel hidden">
                <h2 class="text-2xl font-bold mb-4 text-indigo-800">API Settings</h2>
                <div class="max-w-md">
                    <label class="block font-bold mb-2 text-sm text-gray-700">Paste Gemini Key here</label>
                    <input type="password" id="key-field" placeholder="AIza...">
                    <button onclick="saveKey()" class="bg-green-600 text-white px-6 py-2 rounded font-bold w-full">Save Key</button>
                </div>
            </div>

            <div id="other-panel" class="tab-panel hidden py-20 text-center text-gray-400">
                <i class="fas fa-tools text-5xl mb-4"></i>
                <p>Social Media logic is first! We will activate this button next.</p>
            </div>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = (id === 'social' || id === 'settings') ? id + '-panel' : 'other-panel';
            document.getElementById(target).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
        }

        function saveKey() {
            localStorage.setItem('STABLE_API_KEY', document.getElementById('key-field').value.trim());
            alert('✅ Key Saved! Page refreshing...');
            location.reload();
        }

        async function runCommand() {
            const key = localStorage.getItem('STABLE_API_KEY');
            const out = document.getElementById('out-social');
            const btn = document.getElementById('btn-social');

            if(!key) { alert('Go to Settings first!'); showTab('settings'); return; }

            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> AI Generating...";
            out.innerHTML = "";

            const prompt = `Act as a top Real Estate Marketer. Create 7 social media posts for: ${document.getElementById('f-addr').value}. Price: ${document.getElementById('f-price').value}. Features: ${document.getElementById('f-features').value}.`;

            try {
                // THE CRITICAL FIX: Explicit v1 and gemini-1.5-flash
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                const text = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<div class="output-box">${text.replace(/\*\*/g, '')}</div>`;
            } catch (err) {
                out.innerHTML = `<div class="mt-6 p-4 bg-red-100 text-red-700 rounded-lg font-bold">❌ Connection Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate 7 Posts Now";
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('STABLE_API_KEY');
            if(saved) document.getElementById('key-field').value = saved;
        };
    </script>
</body>
</html>
