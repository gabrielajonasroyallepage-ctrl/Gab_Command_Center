<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Command Center V2 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #7c73e6; }
        .glass-card { background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .nav-btn { background: #6366f1; color: white; border: 1px solid white; border-radius: 8px; font-weight: bold; transition: all 0.2s; }
        .nav-btn.active { background: white; color: #6366f1; border: 2px solid #6366f1; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-2xl p-6 mb-6 shadow-lg">
            <h1 class="text-3xl font-bold text-indigo-600">🚀 Real Estate Command Center V2 Pro</h1>
            <p class="text-gray-500">2026-2030 Edition | AI-Powered</p>
        </div>

        <div class="flex flex-wrap gap-3 mb-6">
            <button onclick="showTab('social')" class="nav-btn active px-6 py-2">📱 Social Media Generator</button>
            <button onclick="showTab('settings')" class="nav-btn bg-black border-none px-6 py-2">⚙️ Settings</button>
        </div>

        <div class="glass-card p-8">
            <div id="social-tab" class="tab-content">
                <h2 class="text-2xl font-bold text-indigo-700 mb-6">📱 AI Social Media Generator</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <input id="addr" type="text" placeholder="Property Address" class="p-3 border rounded-lg">
                    <input id="price" type="text" placeholder="Price" class="p-3 border rounded-lg">
                    <input id="beds" type="text" placeholder="Beds" class="p-3 border rounded-lg">
                    <input id="baths" type="text" placeholder="Baths" class="p-3 border rounded-lg">
                    <textarea id="features" placeholder="Key Features" class="p-3 border rounded-lg md:col-span-2"></textarea>
                </div>

                <button onclick="runGemini()" id="mainBtn" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold shadow-md">Generate 7 Posts Now</button>
                
                <div id="output" class="mt-8"></div>
            </div>

            <div id="settings-tab" class="tab-content hidden">
                <h2 class="text-2xl font-bold mb-4">API Settings</h2>
                <input type="password" id="apiKeyInput" class="w-full p-3 border rounded mb-4" placeholder="Paste Gemini Key Here">
                <button onclick="saveKey()" class="bg-green-600 text-white px-6 py-2 rounded font-bold">Save Key</button>
                <p class="mt-4 text-sm text-gray-500">Make sure the key starts with "AIza..."</p>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function saveKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('my_gemini_key', key);
            alert('✅ Key Saved! Try generating now.');
        }

        async function runGemini() {
            const key = localStorage.getItem('my_gemini_key');
            const out = document.getElementById('output');
            const btn = document.getElementById('mainBtn');

            if(!key) {
                out.innerHTML = `<div class="p-4 bg-yellow-100 text-yellow-800 rounded">⚠️ Please go to Settings and save your API key first!</div>`;
                return;
            }

            btn.innerText = "⏳ AI is Writing...";
            btn.disabled = true;
            out.innerHTML = "Connecting to Google...";

            const promptText = "Create 7 real estate social media posts for: " + document.getElementById('addr').value;

            try {
                // Testing the absolute simplest endpoint
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    // This will tell us EXACTLY what is wrong (e.g. "API_KEY_INVALID")
                    throw new Error(data.error.message || data.error.status);
                }

                const resultText = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<div class="bg-indigo-50 p-6 rounded-xl border-2 border-indigo-200 whitespace-pre-wrap">${resultText}</div>`;

            } catch (err) {
                // Detailed error display
                out.innerHTML = `
                    <div class="p-4 bg-red-100 text-red-700 rounded-lg">
                        <strong>❌ Connection Error:</strong><br>
                        ${err.message}<br><br>
                        <em>Tip: Ensure you copied the FULL key and your internet is connected.</em>
                    </div>`;
            } finally {
                btn.innerText = "Generate 7 Posts Now";
                btn.disabled = false;
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('my_gemini_key');
            if(saved) document.getElementById('apiKeyInput').value = saved;
        };
    </script>
</body>
</html>
